<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Krua Oil Oil - POS V16 Eco Print</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #121212; --surface: #1e1e1e; --primary: #fbbf24; --text: #f3f4f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        @media print {
            body { background: white !important; color: black !important; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            .order-line { 
                font-size: 24pt !important; font-weight: 900 !important; color: black !important;
                border-bottom: 1pt solid #ccc !important; margin-bottom: 5pt !important;
                padding-bottom: 3pt !important; display: block !important; line-height: 1.0 !important;
            }
            .thai-ref { font-size: 8pt !important; font-weight: normal !important; color: #666 !important; }
        }
        body { font-family: 'Prompt', sans-serif; background-color: var(--bg); color: var(--text); padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        #inputText { width: 100%; min-height: 80px; background: var(--surface); color: white; border: 2px solid #444; border-radius: 10px; padding: 10px; margin-bottom: 10px; font-size: 16px; outline: none; }
        #outputWrapper { width: 100%; min-height: 300px; background: #27272a; border: 2px solid var(--primary); border-radius: 10px; padding: 12px; }
        .order-line { font-size: 22px; font-weight: 900; margin-bottom: 8px; border-bottom: 1px dashed #444; padding-bottom: 5px; line-height: 1.2; }
        .thai-ref { font-size: 11px; color: #888; font-weight: normal; margin-left: 2px; }
        .btn-print { width: 100%; background: white; color: black; padding: 15px; font-size: 20px; font-weight: 900; border: 3px solid #ccc; border-radius: 12px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="no-print" style="text-align:center; color:var(--primary); font-size: 20px; margin-bottom:10px;">🍳 ครัวออยออย V16 (Eco)</h1>
        <textarea id="inputText" class="no-print" placeholder="ผัดดอกหอมหมูสับ เผ็ด..."></textarea>
        <div id="outputWrapper"><div id="outputText"></div></div>
        <button class="btn-print no-print" onclick="window.print()">🖨️ พิมพ์ (แบบประหยัดกระดาษ)</button>
    </div>

    <script>
        const emojiDict = {
            // ประเภท
            "กะเพรา": "🌿", "กระเพรา": "🌿", "พริกแกง": "🥘🌶️", "สุกี้น้ำ": "🍲💧", "สุกี้แห้ง": "🍲🔥", "ข้าวผัด": "🍚🔥", "ผัดดอกหอม": "🍳🌱", "ไข่ขยี้": "🍳🔥", "คะน้า": "🥬",
            // เนื้อสัตว์ (แยกหมูชัดเจน)
            "หมูสับ": "🐽", "หมูกรอบ": "🥓", "หมูชิ้น": "🐖", "หมู": "🐖", "ไก่": "🐔", "เนื้อ": "🐂", "กุ้ง": "🦐", "หมึก": "🦑", "ปลาหมึก": "🦑", "ตับ": "🥩🫀", "ปลากระป๋อง": "🥫🐟",
            // ผัก
            "หน่อไม้ดอง": "🎋", "หน่อไม้": "🎋", "ดอกหอม": "🌱",
            // ความเผ็ด
            "ไม่ใส่พริก": "🚫🌶️", "เผ็ดน้อย": "🌶️", "เผ็ดมากมาก": "🔥🌶️🔥", "เผ็ดมาก": "🌶️🌶️🌶️", "เผ็ด": "🌶️🌶️",
            // ไข่
            "ไข่ดาวไม่สุก": "🍳💦", "ไข่ดาวสุก": "🍳✅", "ไข่ดาว": "🍳", "ไข่เจียว": "🥚🔥"
        };

        // เรียงลำดับ: ประเภท > เนื้อสัตว์ > ผัก > เผ็ด > ไข่
        const flow = [
            ["สุกี้น้ำ", "สุกี้แห้ง", "กะเพรา", "กระเพรา", "พริกแกง", "ข้าวผัด", "ผัดดอกหอม", "ไข่ขยี้", "คะน้า"],
            ["หมูสับ", "หมูกรอบ", "หมูชิ้น", "หมู", "ไก่", "เนื้อ", "กุ้ง", "หมึก", "ปลาหมึก", "ตับ", "ปลากระป๋อง"],
            ["หน่อไม้ดอง", "หน่อไม้", "ดอกหอม"],
            ["ไม่ใส่พริก", "เผ็ดน้อย", "เผ็ดมากมาก", "เผ็ดมาก", "เผ็ด"],
            ["ไข่ดาวไม่สุก", "ไข่ดาวสุก", "ไข่ดาว", "ไข่เจียว"]
        ];

        function convert() {
            let lines = document.getElementById('inputText').value.trim().split('\n');
            let htmlOut = "";
            for (let line of lines) {
                if (!line.trim()) continue;
                let qty = (line.match(/[xX×]\s*(\d+)/) || ["", "1"])[1];
                let iconsHtml = "";
                let currentLine = line;

                for (let group of flow) {
                    for (let key of group) {
                        if (currentLine.includes(key)) {
                            iconsHtml += `${emojiDict[key]}<span class="thai-ref">${key}</span> `;
                            currentLine = currentLine.replace(key, "###");
                            break; 
                        }
                    }
                }
                if (iconsHtml) htmlOut += `<div class="order-line">x${qty} ${iconsHtml}</div>`;
            }
            document.getElementById('outputText').innerHTML = htmlOut || "❓ รอกรอกออเดอร์...";
        }
        document.getElementById('inputText').addEventListener('input', convert);
    </script>
</body>
</html>
