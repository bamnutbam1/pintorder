<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Krua Oil Oil V17 - Micro POS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* จุดตาย: การตั้งค่าหน้าพิมพ์ให้จิ๋ว */
        @media print {
            body { background: white; color: black; padding: 0; }
            .no-print { display: none !important; }
            #outputWrapper { border: none !important; padding: 0 !important; width: 100% !important; }
            .order-line { 
                font-size: 18pt !important; /* ขนาดกำลังดี ไม่ใหญ่จนกินที่ */
                font-weight: bold !important;
                border-bottom: 0.5pt solid #000 !important;
                margin-bottom: 3pt !important;
                padding-bottom: 2pt !important;
                display: flex !important;
                align-items: center !important;
                line-height: 1.1 !important;
                white-space: nowrap !important; /* บังคับให้อยู่บรรทัดเดียว */
            }
            .thai-ref { font-size: 7pt !important; color: #444 !important; margin-left: 2px; }
        }

        #inputText { width: 100%; max-width: 400px; height: 60px; background: #222; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 8px; margin-bottom: 10px; }
        #outputWrapper { width: 100%; max-width: 400px; background: #fff; color: #000; border-radius: 8px; padding: 10px; min-height: 200px; }
        .order-line { font-size: 20px; color: #000; border-bottom: 1px solid #eee; padding: 5px 0; display: flex; align-items: center; }
        .thai-ref { font-size: 10px; color: #888; margin-left: 3px; }
        .btn-print { width: 100%; max-width: 400px; background: #4CAF50; color: white; padding: 15px; border: none; border-radius: 8px; margin-top: 10px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
    <h3 class="no-print">🍳 ครัวออยออย V17 (ประหยัดสุด)</h3>
    <textarea id="inputText" class="no-print" placeholder="วางออเดอร์..."></textarea>
    <div id="outputWrapper"><div id="outputText"></div></div>
    <button class="btn-print no-print" onclick="window.print()">🖨️ พิมพ์ออเดอร์</button>

    <script>
        const emojiDict = {
            "สุกี้น้ำ": "🍲💧", "สุกี้แห้ง": "🍲🔥", "กะเพรา": "🌿", "กระเพรา": "🌿", "พริกแกง": "🥘", 
            "ข้าวผัด": "🍚", "ผัดดอกหอม": "🌱", "ไข่ขยี้": "🍳",
            "หมูสับ": "🐽", "หมูกรอบ": "🥓", "หมูชิ้น": "🐖", "หมู": "🐖", "ไก่": "🐔", "เนื้อ": "🐂", 
            "กุ้ง": "🦐", "หมึก": "🦑", "ปลาหมึก": "🦑", "ตับ": "🥩", "ปลากระป๋อง": "🥫",
            "หน่อไม้ดอง": "🎋", "ไม่ใส่พริก": "🚫🌶️", "เผ็ดน้อย": "🌶️", "เผ็ดมากมาก": "🔥🌶️", "เผ็ดมาก": "🌶️🌶️", "เผ็ด": "🌶️",
            "ไข่ดาวไม่สุก": "🍳💦", "ไข่ดาวสุก": "🍳✅", "ไข่เจียว": "🥚"
        };

        const flow = [
            ["สุกี้น้ำ", "สุกี้แห้ง", "กะเพรา", "กระเพรา", "พริกแกง", "ข้าวผัด", "ผัดดอกหอม", "ไข่ขยี้"],
            ["หมูสับ", "หมูกรอบ", "หมูชิ้น", "หมู", "ไก่", "เนื้อ", "กุ้ง", "หมึก", "ตับ", "ปลากระป๋อง"],
            ["หน่อไม้ดอง"], ["ไม่ใส่พริก", "เผ็ดน้อย", "เผ็ดมากมาก", "เผ็ดมาก", "เผ็ด"],
            ["ไข่ดาวไม่สุก", "ไข่ดาวสุก", "ไข่เจียว"]
        ];

        function convert() {
            let lines = document.getElementById('inputText').value.trim().split('\n');
            let htmlOut = "";
            for (let line of lines) {
                if (!line.trim()) continue;
                let qty = (line.match(/[xX×]\s*(\d+)/) || ["", "1"])[1];
                let iconsHtml = "";
                let tempLine = line;

                for (let group of flow) {
                    for (let key of group) {
                        if (tempLine.includes(key)) {
                            iconsHtml += `${emojiDict[key]}<span class="thai-ref">${key}</span> `;
                            tempLine = tempLine.replace(key, "");
                            break;
                        }
                    }
                }
                if (iconsHtml) htmlOut += `<div class="order-line">x${qty} ${iconsHtml}</div>`;
            }
            document.getElementById('outputText').innerHTML = htmlOut || "รอออเดอร์...";
        }
        document.getElementById('inputText').addEventListener('input', convert);
    </script>
</body>
</html>
