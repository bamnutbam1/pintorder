<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Krua Oil Oil V29 - Bug Free Flow</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { --bg: #121212; --primary: #fbbf24; --surface: #1e1e1e; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Prompt', sans-serif; background: var(--bg); color: #fff; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        @media print {
            .no-print { display: none !important; }
            #outputWrapper { border: none !important; width: 100% !important; background: white !important; color: black !important; }
            .bill-header { border-bottom: 2pt solid black !important; margin-bottom: 8pt !important; padding-bottom: 5pt !important; }
            .order-line { font-size: 24pt !important; font-weight: 900 !important; border-bottom: 1pt solid black !important; margin-bottom: 6pt !important; padding-bottom: 3pt !important; line-height: 1.1 !important; }
            .thai-ref { font-size: 8pt !important; color: #444 !important; }
        }
        .input-group { width: 100%; max-width: 500px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .input-full { grid-column: span 2; }
        input, textarea { width: 100%; background: var(--surface); color: #fff; border: 1px solid #444; border-radius: 8px; padding: 10px; font-size: 14px; outline: none; }
        textarea { height: 120px; }
        #outputWrapper { width: 100%; max-width: 500px; background: #fff; color: #000; border-radius: 10px; padding: 15px; }
        .bill-header { border-bottom: 1px double #000; margin-bottom: 12px; padding-bottom: 8px; }
        .header-row { display: flex; justify-content: space-between; margin-bottom: 2px; font-size: 12px; font-weight: bold; }
        .order-line { font-size: 22px; font-weight: bold; border-bottom: 1px dashed #ccc; padding: 6px 0; line-height: 1.3; display: flex; align-items: center; flex-wrap: wrap; }
        .qty-badge { font-size: 24px; color: #e11d48; margin-right: 8px; font-weight: 900; }
        .thai-ref { font-size: 10px; color: #777; margin-left: 2px; font-weight: normal; }
        .btn-group { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .btn { padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .btn-print { background: #fff; color: #000; border: 2px solid #ccc; }
        .btn-copy { background: #06C755; color: #fff; }
    </style>
</head>
<body>
    <h2 class="no-print" style="margin-bottom:10px; color:var(--primary);">🍳 ครัวออยออย V29</h2>
    <div class="input-group no-print">
        <input type="text" id="custName" placeholder="ชื่อลูกค้า">
        <input type="text" id="orderNo" placeholder="ลำดับ #">
        <input type="text" id="location" class="input-full" placeholder="สถานที่ส่ง">
        <input type="text" id="deliveryTime" class="input-full" placeholder="เวลาจัดส่ง">
        <textarea id="inputText" class="input-full" placeholder="พิมพ์ออเดอร์..."></textarea>
    </div>
    <div id="outputWrapper">
        <div class="bill-header">
            <div style="text-align:center; font-size: 16px; font-weight: 900; margin-bottom: 5px;">--- บิลครัวออยออย ---</div>
            <div class="header-row"><span id="outCust">ชื่อ: -</span> <span id="outNo"># -</span></div>
            <div class="header-row"><span id="outLoc">สถานที่ส่ง: -</span></div>
            <div class="header-row"><span id="outDelTime" style="color:red; font-size: 14px;">เวลาจัดส่ง: -</span></div>
            <div class="header-row"><span id="outDate">วันที่: -</span></div>
            <div class="header-row"><span id="outTime">เวลาที่สั่ง: -</span></div>
        </div>
        <div id="outputText"></div>
    </div>
    <div class="btn-group no-print">
        <button class="btn btn-print" onclick="window.print()">🖨️ พิมพ์บิล</button>
        <button class="btn btn-copy" onclick="copyAsImage()">🖼️ ส่งรูปเข้า LINE</button>
    </div>

    <script>
        const emojiDict = {
            "กะเพรา": "🌿", "กระเพรา": "🌿", "พริกแกง": "🥘", "ทอดกระเทียม": "🧄🔥", "กระเทียม": "🧄", 
            "สุกี้น้ำ": "🍲💧", "สุกี้แห้ง": "🍲🔥", "ข้าวผัด": "🍚", "แกงจืด": "🥣", "ไข่เจียว": "🥚🔥",
            "หมูสับ": "🐽", "หมูกรอบ": "🥓", "หมูชิ้น": "🐖", "หมู": "🐖", "ไก่": "🐔", "เนื้อ": "🐂", "กุ้ง": "🦐", "หมึก": "🦑", "ทะเล": "🦐🦑", "รวมมิตร": "🦑🦐🐷", "ตับ": "🥩",
            "ไม่ใส่พริก": "🚫🌶️", "เผ็ดน้อย": "🌶️", "เผ็ดมากมาก": "🔥🌶️🔥", "เผ็ดมาก": "🌶️🌶️🌶️", "เผ็ด": "🌶️🌶️",
            "ไข่ดาวไม่สุก": "🍳💦", "ไข่ดาวสุก": "🍳✅", "ไข่ดาว": "🍳",
            "ใส่ถ้วย": "🥣✅", "ถ้วย": "🥣", "2 ฟอง": "🥚x2", "พิเศษ": "⭐", "ไม่กระเทียม": "🚫🧄"
        };

        const flowGroups = [
            ["สุกี้น้ำ", "สุกี้แห้ง", "กะเพรา", "กระเพรา", "พริกแกง", "ทอดกระเทียม", "กระเทียม", "ข้าวผัด", "แกงจืด", "ไข่เจียว"],
            ["หมูสับ", "หมูกรอบ", "หมูชิ้น", "หมู", "ไก่", "เนื้อ", "กุ้ง", "หมึก", "ทะเล", "รวมมิตร", "ตับ"],
            ["ไม่ใส่พริก", "เผ็ดน้อย", "เผ็ดมากมาก", "เผ็ดมาก", "เผ็ด"],
            ["ไข่ดาวไม่สุก", "ไข่ดาวสุก", "ไข่ดาว"], // ตัดไข่เจียวออกจากกลุ่มไข่ดาวเพื่อไม่ให้ซ้ำ
            ["ใส่ถ้วย", "ถ้วย", "2 ฟอง", "พิเศษ", "ไม่กระเทียม"]
        ];

        function convert() {
            const now = new Date();
            document.getElementById('outCust').innerText = "ชื่อ: " + (document.getElementById('custName').value || "-");
            document.getElementById('outNo').innerText = (document.getElementById('orderNo').value || "# -");
            document.getElementById('outLoc').innerText = "สถานที่ส่ง: " + (document.getElementById('location').value || "-");
            document.getElementById('outDelTime').innerText = "เวลาจัดส่ง: " + (document.getElementById('deliveryTime').value || "-");
            document.getElementById('outDate').innerText = "วันที่: " + now.toLocaleDateString('th-TH');
            document.getElementById('outTime').innerText = "เวลาที่สั่ง: " + now.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'});

            let lines = document.getElementById('inputText').value.trim().split('\n');
            let htmlOut = "";

            for (let line of lines) {
                if (!line.trim()) continue;
                let qty = "1";
                let qMatch = line.match(/^(\d+)/) || line.match(/(\d+)$/);
                if (qMatch && !line.includes("2 ฟอง")) qty = qMatch[1];

                let iconsHtml = "";
                let foundKeys = [];
                let lineForSearch = line;

                // ระบบค้นหาแบบเรียงลำดับความยาว (ป้องกัน หมู ซ้ำ หมูกรอบ)
                flowGroups.forEach(group => {
                    let sortedGroup = [...group].sort((a, b) => b.length - a.length);
                    for (let key of sortedGroup) {
                        if (lineForSearch.includes(key)) {
                            // เช็กว่าไอคอนนี้ถูกใส่ไปหรือยัง (ป้องกันไข่เจียวซ้ำ)
                            if (!foundKeys.includes(emojiDict[key])) {
                                iconsHtml += `${emojiDict[key]}<span class="thai-ref">${key}</span> `;
                                foundKeys.push(emojiDict[key]);
                            }
                            // ลบคำที่หาเจอออกจากประโยคชั่วคราวเพื่อไม่ให้คำสั้นกว่ามาซ้ำ (เช่น หมูกรอบ -> ###กรอบ)
                            lineForSearch = lineForSearch.replace(key, "###");
                            
                            // ถ้าไม่ใช่กลุ่มเนื้อสัตว์ ให้หยุดหาในกลุ่มนี้ทันที (ประเภทอาหารมีได้อย่างเดียว)
                            if (group !== flowGroups[1]) break;
                        }
                    }
                });

                if (iconsHtml) htmlOut += `<div class="order-line"><span class="qty-badge">x${qty}</span> ${iconsHtml}</div>`;
            }
            document.getElementById('outputText').innerHTML = htmlOut || "<span style='color:#ccc'>รอออเดอร์...</span>";
        }

        async function copyAsImage() {
            const wrapper = document.getElementById('outputWrapper');
            const canvas = await html2canvas(wrapper);
            canvas.toBlob(async (blob) => {
                const data = [new ClipboardItem({ [blob.type]: blob })];
                await navigator.clipboard.write(data);
                alert('คัดลอกรูปแล้ว!');
            });
        }

        ['custName', 'orderNo', 'location', 'deliveryTime', 'inputText'].forEach(id => {
            document.getElementById(id).addEventListener('input', convert);
        });
    </script>
</body>
</html>
